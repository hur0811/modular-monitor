name: 모듈러 동향 자동 갱신

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 필요한 패키지 설치
        run: pip install requests

      - name: 수집기 실행 (DART + 네이버 뉴스)
        env:
          DART_KEY: ${{ secrets.DART_KEY }}
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
        run: python collector.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "modular-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add dashboard_data.json
          if git diff --staged --quiet; then
            echo "변경된 데이터 없음 - 커밋 생략"
          else
            git commit -m "데이터 자동 갱신 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
