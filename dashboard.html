<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>모듈러 동종사 모니터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B0E14; --panel:#171E29; --panel-2:#1F2634; --line:#2E3648;
  --line-soft:#20273400; --txt:#E9ECF1; --muted:#8B93A7; --muted-2:#5F6678;
  --amber:#F5A623; --amber-dim:#8a5f18;
  --cyan:#4FB0C6; --violet:#A78BFA; --green:#5FD08A; --slate:#7C8AA5;
  --cat-sigong:var(--amber); --cat-jejak:var(--cyan); --cat-gajeon:var(--violet); --cat-seolgye:var(--green); --cat-etc:var(--slate);
  --radius:14px; --grid:#23303f;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --disp:'Space Grotesk','Pretendard',sans-serif;
  --body:'Pretendard',-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--ink); color:var(--txt); font-family:var(--body);
  font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;
}
/* 격자무늬는 상단에만 은은하게 남기고, 콘텐츠 영역은 깨끗한 단색으로 (가독성 우선) */
body::before{
  content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:42px 42px; opacity:.55;
  -webkit-mask-image:radial-gradient(130% 55% at 50% -12%, #000 0%, rgba(0,0,0,.35) 38%, transparent 62%);
  mask-image:radial-gradient(130% 55% at 50% -12%, #000 0%, rgba(0,0,0,.35) 38%, transparent 62%);
}
body::after{
  content:""; position:fixed; left:50%; top:-140px; width:760px; height:340px; transform:translateX(-50%);
  z-index:-1; pointer-events:none; border-radius:50%;
  background:radial-gradient(closest-side, rgba(245,166,35,.10), transparent 72%);
}
.wrap{max-width:1240px;margin:0 auto;padding:0 22px 90px}

/* ---------- header ---------- */
.top{padding:30px 0 18px;border-bottom:1px solid var(--line);margin-bottom:22px}
.brandrow{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{width:44px;height:44px;flex:none;position:relative}
.logo i{position:absolute;border:2px solid var(--amber);border-radius:3px}
.logo i:nth-child(1){left:0;top:0;width:18px;height:18px;background:rgba(245,166,35,.15)}
.logo i:nth-child(2){right:0;top:0;width:18px;height:18px}
.logo i:nth-child(3){left:0;bottom:0;width:18px;height:18px}
.logo i:nth-child(4){right:0;bottom:0;width:18px;height:18px;background:rgba(245,166,35,.15)}
h1{font-family:var(--disp);font-weight:700;font-size:23px;letter-spacing:-.01em;margin:0;line-height:1.1}
h1 small{display:block;font-family:var(--body);font-weight:500;font-size:12.5px;color:var(--muted);letter-spacing:.02em;margin-top:3px}
.head-meta{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pill{font-family:var(--mono);font-size:11px;padding:5px 10px;border:1px solid var(--line);border-radius:20px;color:var(--muted);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.pill b{color:var(--txt);font-weight:500}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(95,208,138,.15)}
.dot.embedded{background:var(--slate);box-shadow:0 0 0 3px rgba(124,138,165,.15)}
.btn{font-family:var(--body);font-size:12.5px;font-weight:500;background:var(--panel-2);color:var(--txt);border:1px solid var(--line);padding:6px 12px;border-radius:9px;cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

/* ---------- controls ---------- */
.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.search{flex:1;min-width:220px;position:relative}
.search input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--txt);font-family:var(--body);font-size:14px;padding:11px 14px 11px 40px}
.search input::placeholder{color:var(--muted-2)}
.search input:focus{outline:none;border-color:var(--amber)}
.search svg{position:absolute;left:13px;top:12px;width:16px;height:16px;stroke:var(--muted);fill:none}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-size:12.5px;padding:8px 13px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;transition:.15s;font-family:var(--body);display:inline-flex;align-items:center;gap:7px}
.chip:hover{color:var(--txt)}
.chip .sw{width:8px;height:8px;border-radius:2px}
.chip[data-on="1"]{color:var(--ink);font-weight:600}
.chip[data-cat="시공사"][data-on="1"]{background:var(--cat-sigong);border-color:var(--cat-sigong)}
.chip[data-cat="제작사"][data-on="1"]{background:var(--cat-jejak);border-color:var(--cat-jejak)}
.chip[data-cat="가전사"][data-on="1"]{background:var(--cat-gajeon);border-color:var(--cat-gajeon)}
.chip[data-cat="설계사"][data-on="1"]{background:var(--cat-seolgye);border-color:var(--cat-seolgye)}
.chip[data-cat="전체"][data-on="1"]{background:var(--txt);border-color:var(--txt)}

/* ---------- tabs ---------- */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:26px}
.tab{font-family:var(--disp);font-weight:500;font-size:14px;letter-spacing:.01em;background:none;border:none;color:var(--muted);padding:12px 18px;cursor:pointer;position:relative;transition:.15s}
.tab:hover{color:var(--txt)}
.tab[data-on="1"]{color:var(--txt)}
.tab[data-on="1"]::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:2px;background:var(--amber)}
.tab span{font-family:var(--mono);font-size:11px;color:var(--muted-2);margin-left:7px}

/* ---------- KPI ---------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber)}
.kpi .n{font-family:var(--disp);font-weight:700;font-size:27px;line-height:1}
.kpi .l{font-size:12px;color:var(--muted);margin-top:6px}

/* ---------- cards ---------- */
.catgroup{margin-bottom:34px}
.catgroup h2{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.02em;display:flex;align-items:center;gap:10px;margin:0 0 14px;text-transform:uppercase}
.catgroup h2 .bar{width:22px;height:3px;border-radius:2px}
.catgroup h2 em{font-style:normal;font-family:var(--mono);font-size:11px;color:var(--muted-2);font-weight:400}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:.18s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);border-color:var(--line)}
.card .strip{height:4px}
.card .body{padding:16px 17px 17px}
.card .name{font-family:var(--disp);font-weight:600;font-size:16.5px;line-height:1.2;letter-spacing:-.01em}
.card .status{display:inline-block;font-size:11px;font-family:var(--mono);margin-top:8px;padding:3px 8px;border-radius:6px;background:var(--panel-2);color:var(--muted)}
.card .sectors{font-size:12.5px;color:var(--muted);margin-top:11px;line-height:1.5}
.fin{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
.fin-head{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted-2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.fin-head .need{color:var(--amber-dim);border:1px solid var(--amber-dim);border-radius:5px;padding:1px 6px;font-size:9.5px}
.fintab{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
.fintab td,.fintab th{padding:3px 0;text-align:right}
.fintab th:first-child,.fintab td:first-child{text-align:left;color:var(--muted)}
.fintab th{color:var(--muted-2);font-weight:400;font-size:10.5px}
.fintab .rev{color:var(--txt)}
.fintab .op{color:var(--cyan)}
.meta-list{margin-top:13px;display:flex;flex-direction:column;gap:7px}
.mrow{display:flex;gap:9px;font-size:12.5px;line-height:1.45}
.mrow .k{flex:none;width:62px;color:var(--muted-2);font-size:11px;padding-top:1px}
.mrow .v{color:var(--txt-2,#cfd4de)}
.tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10.5px;font-family:var(--mono);padding:3px 7px;border-radius:5px;border:1px solid var(--line);color:var(--muted)}
.src{margin-top:12px;font-size:10.5px;color:var(--muted-2);font-family:var(--mono)}

/* ---------- timeline ---------- */
.tl{position:relative;padding-left:20px}
.tl::before{content:"";position:absolute;left:4px;top:4px;bottom:4px;width:2px;background:var(--line)}
.ev{position:relative;padding:0 0 22px 26px}
.ev::before{content:"";position:absolute;left:-20px;top:5px;width:11px;height:11px;border-radius:3px;background:var(--panel);border:2px solid var(--amber);transform:rotate(45deg)}
.ev.type-MOU체결::before{border-color:var(--green)}
.ev.type-특허::before{border-color:var(--violet)}
.ev.type-입찰·수주::before{border-color:var(--amber)}
.ev.type-R\&D::before{border-color:var(--cyan)}
.ev.type-제품출시::before{border-color:#EC6A9C}
.ev.type-설비투자::before{border-color:var(--slate)}
.ev .date{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.ev .etype{font-family:var(--mono);font-size:10px;margin-left:9px;padding:2px 7px;border-radius:5px;border:1px solid var(--line);color:var(--muted)}
.ev .etitle{font-weight:600;font-size:15px;margin:5px 0 4px;line-height:1.35}
.ev .esum{font-size:13px;color:var(--muted);line-height:1.55}
.ev .ecos{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.cochip{font-size:11px;padding:2px 9px;border-radius:20px;border:1px solid var(--line);color:var(--txt)}
.ev a.slink{font-size:11px;font-family:var(--mono);color:var(--muted-2);text-decoration:none;border-bottom:1px dotted var(--muted-2)}
.ev a.slink:hover{color:var(--cyan);border-color:var(--cyan)}

/* ---------- diagram ---------- */
.diagwrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:6px;overflow-x:auto}
.diag-legend{display:flex;gap:16px;flex-wrap:wrap;padding:12px 14px 4px;font-size:12px;color:var(--muted)}
.diag-legend span{display:inline-flex;align-items:center;gap:7px}
.diag-legend .sw{width:10px;height:10px;border-radius:3px}
svg .node rect{transition:.15s}
svg .node text{font-family:var(--body);font-size:12px;fill:var(--txt);pointer-events:none;font-weight:500}
svg .node .sub{font-size:9px;fill:var(--muted-2);font-family:var(--mono)}
svg .link{fill:none;stroke:var(--line);stroke-width:1.5;transition:.15s}
svg.dim .node{opacity:.28}
svg.dim .node.hot{opacity:1}
svg.dim .link{opacity:.06}
svg.dim .link.hot{opacity:1;stroke-width:2.2}
.edgelabel{font-family:var(--mono);font-size:10px;fill:var(--muted)}
.diag-hint{padding:8px 14px 14px;font-size:11.5px;color:var(--muted-2)}

/* upload hidden */
#file{display:none}
.hidden{display:none!important}
.empty{padding:50px 20px;text-align:center;color:var(--muted);font-size:14px}

@media(max-width:720px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .cards{grid-template-columns:1fr}
  h1{font-size:20px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}

/* ---------- 재무 별도/연결 토글 ---------- */
.finmode{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex:none}
.finmode button{font-family:var(--mono);font-size:11.5px;padding:8px 13px;background:transparent;border:none;color:var(--muted);cursor:pointer;transition:.15s}
.finmode button+button{border-left:1px solid var(--line)}
.finmode button:hover{color:var(--txt)}
.finmode button[data-on="1"]{background:var(--panel-2);color:var(--amber);font-weight:700}
.m-fintoggle{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;flex:none}
.m-fintoggle button{font-family:var(--mono);font-size:10px;padding:3px 9px;background:transparent;border:none;color:var(--muted);cursor:pointer}
.m-fintoggle button+button{border-left:1px solid var(--line)}
.m-fintoggle button[data-on="1"]{background:var(--panel-2);color:var(--amber);font-weight:700}

/* ---------- timeline legend (clickable filter) ---------- */
.tl-legend{display:flex;flex-wrap:wrap;gap:8px 10px;padding:2px 0 16px;margin-bottom:20px;border-bottom:1px dashed var(--line);align-items:center}
.tl-legend .lb{font-family:var(--mono);font-size:10.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em;margin-right:4px}
.tl-legend span[data-type]{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer;padding:4px 10px;border-radius:20px;border:1px solid transparent;transition:.15s}
.tl-legend span[data-type]:hover{color:var(--txt);border-color:var(--line)}
.tl-legend span[data-on="1"]{color:var(--txt);font-weight:600;background:var(--panel-2);border-color:var(--line)}
.tl-legend i{width:9px;height:9px;border-radius:2px;transform:rotate(45deg);border:2px solid currentColor;display:inline-block}

/* ---------- clickable KPI ---------- */
.card{cursor:pointer}
.kpi.clickable{cursor:pointer}
.kpi.clickable:hover{border-color:var(--amber);transform:translateY(-2px)}
.kpi .go{position:absolute;top:13px;right:14px;font-family:var(--mono);font-size:14px;color:var(--muted-2);transition:.15s}
.kpi.clickable:hover .go{color:var(--amber);transform:translate(2px,-2px)}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(7,9,13,.74);backdrop-filter:blur(5px);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:44px 18px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:660px;width:100%;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5);animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
.modal .mstrip{height:5px;border-radius:16px 16px 0 0}
.mclose{position:absolute;top:13px;right:14px;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel-2);color:var(--muted);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;transition:.15s}
.mclose:hover{border-color:var(--amber);color:var(--amber)}
.mclose:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.mbody{padding:24px 26px 28px}
.m-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.m-name{font-family:var(--disp);font-weight:700;font-size:24px;letter-spacing:-.01em;margin:6px 0 10px;line-height:1.15}
.m-status{display:inline-block;font-family:var(--mono);font-size:11.5px;padding:4px 10px;border-radius:7px;background:var(--panel-2);color:var(--muted)}
.m-sectors{font-size:14px;color:var(--muted);margin:13px 0 4px;line-height:1.6}
.m-sec{margin-top:20px}
.m-sec>h4{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-2);margin:0 0 10px;display:flex;align-items:center;gap:8px}
.m-sec>h4::after{content:"";flex:1;height:1px;background:var(--line)}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 22px}
.m-row .k{font-size:11px;color:var(--muted-2)}
.m-row .v{font-size:13.5px;color:#d6dbe6;line-height:1.5;margin-top:2px}
.m-fin{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:13px}
.m-fin th,.m-fin td{padding:5px 0;text-align:right;border-bottom:1px solid var(--line)}
.m-fin th:first-child,.m-fin td:first-child{text-align:left;color:var(--muted)}
.m-fin th{color:var(--muted-2);font-weight:400;font-size:11px}
.m-fin .rev{color:var(--txt)} .m-fin .op{color:var(--cyan)}
.m-tags{display:flex;flex-wrap:wrap;gap:6px}
.m-tags .tag{font-size:11px}
.m-ev{padding:11px 0;border-bottom:1px solid var(--line)}
.m-ev:last-child{border-bottom:none}
.m-ev .d{font-family:var(--mono);font-size:11px;color:var(--muted)}
.m-ev .et{font-family:var(--mono);font-size:9.5px;margin-left:8px;padding:2px 7px;border-radius:5px;border:1px solid var(--line);color:var(--muted)}
.m-ev .tt{font-weight:600;font-size:13.5px;margin:5px 0 3px;line-height:1.35}
.m-ev .ss{font-size:12px;color:var(--muted);line-height:1.5}
.m-ev a{font-size:10.5px;font-family:var(--mono);color:var(--muted-2);text-decoration:none;border-bottom:1px dotted var(--muted-2)}
.m-ev a:hover{color:var(--cyan);border-color:var(--cyan)}
.m-none{font-size:12.5px;color:var(--muted-2);padding:6px 0}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brandrow">
      <div class="logo"><i></i><i></i><i></i><i></i></div>
      <div>
        <h1>모듈러 동종사 모니터<small>MODULAR / PREFAB · 경쟁사 동향 인텔리전스 · 사업실</small></h1>
      </div>
      <div class="head-meta">
        <span class="pill"><span class="dot embedded" id="srcDot"></span><b id="srcLabel">내장 데이터</b></span>
        <span class="pill">업데이트 <b id="upd">—</b></span>
        <button class="btn" id="btnLocal" title="수집기(--serve)에서 최신 데이터 불러오기">로컬 서버 연결</button>
        <button class="btn" id="btnUpload">JSON 불러오기</button>
        <input type="file" id="file" accept="application/json,.json">
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="search">
      <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" placeholder="회사명·키워드·프로젝트 검색 (예: 모듈러, MOU, 가리봉동)">
    </div>
    <div class="chips" id="catChips"></div>
    <div class="finmode" id="finModeCtl" title="재무제표 기준 전환 (DART 수집 회사에 적용)">
      <button data-m="ofs" data-on="1">별도</button><button data-m="cfs" data-on="0">연결</button>
    </div>
  </div>

  <nav class="tabs">
    <button class="tab" data-view="profile" data-on="1">프로필<span id="tc-p"></span></button>
    <button class="tab" data-view="timeline">동향 타임라인<span id="tc-t"></span></button>
    <button class="tab" data-view="diagram">협력 관계도<span id="tc-d"></span></button>
  </nav>

  <section id="view-profile">
    <div class="kpis" id="kpis"></div>
    <div id="cardArea"></div>
  </section>

  <section id="view-timeline" class="hidden">
    <div class="tl-legend" id="tlLegend"></div>
    <div class="tl" id="tlArea"></div>
  </section>

  <section id="view-diagram" class="hidden">
    <div class="diag-legend" id="diagLegend"></div>
    <div class="diagwrap"><div id="diagArea"></div></div>
    <p class="diag-hint">노드에 마우스를 올리면 연결된 회사와 관계가 강조됩니다. 선 위 라벨은 협력 유형입니다.</p>

/* ============ 상태 ============ */
let DATA = EMBEDDED_DATA;
let activeCat = "전체";
let query = "";
let view = "profile";
let activeType = null;   // 타임라인 이슈유형 필터 (null = 전체)
let finMode = "ofs";     // 재무 표시: "ofs"=별도(기본) / "cfs"=연결
const CATS = ["시공사","제작사","가전사","설계사"];
const CAT_VAR = {"시공사":"--cat-sigong","제작사":"--cat-jejak","가전사":"--cat-gajeon","설계사":"--cat-seolgye","공공/기타":"--cat-etc"};
const catColor = c => `var(${CAT_VAR[c]||"--cat-etc"})`;
const fmt = n => n==null? "—" : new Intl.NumberFormat('ko').format(n);
const esc = s => (s||"").replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

/* ============ 필터 ============ */
function matchCompany(c){
  if(activeCat!=="전체" && c.category!==activeCat) return false;
  if(!query) return true;
  const hay = [c.name,c.sectors,c.projects,c.status,(c.ip||[]).join(" "),c.method,c.facility].join(" ").toLowerCase();
  return hay.includes(query);
}
function matchEvent(e){
  const cats = new Set((e.companies||[]).map(n=>{const c=DATA.companies.find(x=>x.name===n);return c?c.category:null;}));
  if(activeCat!=="전체" && !cats.has(activeCat)) return false;
  if(!query) return true;
  const hay = [e.title,e.summary,e.type,(e.companies||[]).join(" ")].join(" ").toLowerCase();
  return hay.includes(query);
}

/* ============ 렌더: 프로필 카드 ============ */
function pickFin(c){
  // finMode에 따라 별도/연결 데이터 선택. 연결이 없으면 별도로 대체(라벨로 표시).
  const ofs = c.financials||{}, cfs = c.financials_cfs||null;
  const cfsHas = cfs && Object.keys(cfs).some(y=>cfs[y]&&(cfs[y].rev!=null||cfs[y].op!=null));
  if(finMode==="cfs" && cfsHas) return {f:cfs, label:" · 연결"};
  if(cfsHas) return {f:ofs, label:" · 별도"};   // 연결 데이터가 있는 회사만 별도/연결 구분 표기
  return {f:ofs, label:""};                      // 수동입력·단일 출처는 구분 없이 표기
}
function finTable(c){
  const {f, label} = pickFin(c);
  const yrs = Object.keys(f).sort();
  const has = yrs.some(y=>f[y] && (f[y].rev!=null||f[y].op!=null));
  const need = !has ? `<span class="need">DART 연동 필요</span>` : "";
  let rows = `<tr><th>연도</th>${yrs.map(y=>`<th>${y}</th>`).join("")}</tr>`;
  rows += `<tr><td>매출</td>${yrs.map(y=>`<td class="rev">${f[y]&&f[y].rev!=null?fmt(f[y].rev)+(f[y].est?"*":""):"—"}</td>`).join("")}</tr>`;
  rows += `<tr><td>영업익</td>${yrs.map(y=>`<td class="op">${f[y]&&f[y].op!=null?fmt(f[y].op)+(f[y].est?"*":""):"—"}</td>`).join("")}</tr>`;
  return `<div class="fin"><div class="fin-head"><span>재무 (억원${label})</span>${need}</div><table class="fintab">${rows}</table></div>`;
}
function card(c){
  const col = catColor(c.category);
  const tags = (c.ip||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
  return `<article class="card" data-name="${esc(c.name)}" tabindex="0" role="button">
    <div class="strip" style="background:${col}"></div>
    <div class="body">
      <div class="name">${esc(c.name)}</div>
      <div class="status">${esc(c.status)}</div>
      <div class="sectors">${esc(c.sectors)}</div>
      ${finTable(c)}
      <div class="meta-list">
        ${c.facility&&c.facility!=="—"?`<div class="mrow"><span class="k">생산시설</span><span class="v">${esc(c.facility)}</span></div>`:""}
        ${c.capa&&c.capa!=="—"?`<div class="mrow"><span class="k">생산Capa</span><span class="v">${esc(c.capa)}</span></div>`:""}
        ${c.org&&c.org!=="—"?`<div class="mrow"><span class="k">전담조직</span><span class="v">${esc(c.org)}</span></div>`:""}
        <div class="mrow"><span class="k">주요실적</span><span class="v">${esc(c.projects)}</span></div>
      </div>
      ${tags?`<div class="tags">${tags}</div>`:""}
      <div class="src">출처 · ${esc(c.source||"")}</div>
    </div>
  </article>`;
}
function renderCards(){
  const area = document.getElementById('cardArea');
  const shown = DATA.companies.filter(matchCompany);
  document.getElementById('tc-p').textContent = shown.length;
  if(!shown.length){area.innerHTML=`<div class="empty">조건에 맞는 회사가 없습니다.</div>`;return;}
  const groups = activeCat==="전체" ? CATS : [activeCat];
  area.innerHTML = groups.map(cat=>{
    const list = shown.filter(c=>c.category===cat);
    if(!list.length) return "";
    return `<div class="catgroup">
      <h2><span class="bar" style="background:${catColor(cat)}"></span>${cat}<em>${list.length}</em></h2>
      <div class="cards">${list.map(card).join("")}</div>
    </div>`;
  }).join("");
  area.querySelectorAll('.card').forEach(el=>{
    const open=()=>{const c=DATA.companies.find(x=>x.name===el.dataset.name);if(c)openCompany(c);};
    el.onclick=open;
    el.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();open();}};

}

/* ============ 렌더: 관계도 ============ */
function renderDiagram(){
  document.getElementById('tc-d').textContent = (DATA.relations||[]).length;
  // 카테고리별 컬럼 배치 + 보조 노드(공공/기타)
  const auxCat = {"LH":"공공/기타","현대제철":"공공/기타","현대건설":"시공사","간삼생활디자인(제작)":"제작사","자이가이스트(제작)":"제작사","포스코A&C(제작)":"제작사","단우드(제작)":"제작사"};
  const nodeCat = name=>{const c=DATA.companies.find(x=>x.name===name);return c?c.category:(auxCat[name]||"공공/기타");};
  // 등장 노드 수집
  const names = new Set();
  (DATA.relations||[]).forEach(r=>{names.add(r.from);names.add(r.to);});
  const cols = ["가전사","시공사","제작사","설계사","공공/기타"];
  const byCol = {}; cols.forEach(c=>byCol[c]=[]);
  [...names].forEach(n=>{const cat=nodeCat(n);(byCol[cat]||byCol["공공/기타"]).push(n);});
  // 좌표
  const NW=150,NH=40,colGap=44,rowGap=20,padX=24,padY=28;
  const colX = {}; let x=padX;
  cols.forEach(c=>{colX[c]=x;x+=NW+colGap;});
  const width = x - colGap + padX;
  let maxRows=0; cols.forEach(c=>maxRows=Math.max(maxRows,byCol[c].length));
  const height = padY*2 + maxRows*(NH+rowGap);
  const pos={};
  cols.forEach(c=>{
    const list=byCol[c]; const colH=list.length*(NH+rowGap)-rowGap;
    const startY=(height-colH)/2;
    list.forEach((n,i)=>{pos[n]={x:colX[c],y:startY+i*(NH+rowGap),cat:c};});
  });
  // 엣지
  const edges=(DATA.relations||[]).map((r,i)=>{
    const a=pos[r.from],b=pos[r.to]; if(!a||!b)return"";
    const x1=a.x+NW,y1=a.y+NH/2,x2=b.x,y2=b.y+NH/2;
    const mx=(x1+x2)/2;
    const d=`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
    const lx=mx,ly=(y1+y2)/2-4;
    return `<path class="link" data-i="${i}" d="${d}"/>
      <text class="edgelabel" data-i="${i}" x="${lx}" y="${ly}" text-anchor="middle" style="opacity:0">${esc(r.label)}</text>`;
  }).join("");
  // 노드
  const nodes=[...names].map(n=>{
    const p=pos[n]; const col=catColor(p.cat);
    return `<g class="node" data-name="${esc(n)}">
      <rect x="${p.x}" y="${p.y}" width="${NW}" height="${NH}" rx="8" fill="var(--panel-2)" stroke="${col}" stroke-width="1.5"/>
      <rect x="${p.x}" y="${p.y}" width="4" height="${NH}" rx="2" fill="${col}"/>
      <text x="${p.x+14}" y="${p.y+NH/2+4}">${esc(n.length>13?n.slice(0,12)+'…':n)}</text>
    </g>`;
  }).join("");
  const svg=`<svg id="diagSvg" viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" style="max-width:none">
    <g class="links">${edges}</g><g class="nodes">${nodes}</g></svg>`;
  document.getElementById('diagArea').innerHTML=svg;
  // legend
  document.getElementById('diagLegend').innerHTML = ["시공사","제작사","가전사","설계사","공공/기타"].map(c=>
    `<span><span class="sw" style="background:${catColor(c)}"></span>${c}</span>`).join("");
  // interaction
  const el=document.getElementById('diagSvg');
  const adj={}; (DATA.relations||[]).forEach((r,i)=>{(adj[r.from]=adj[r.from]||[]).push({i,other:r.to});(adj[r.to]=adj[r.to]||[]).push({i,other:r.from});});
  el.querySelectorAll('.node').forEach(g=>{
    g.addEventListener('mouseenter',()=>{
      const name=g.dataset.name; el.classList.add('dim');
      const hotNodes=new Set([name]); const hotEdges=new Set();
      (adj[name]||[]).forEach(({i,other})=>{hotNodes.add(other);hotEdges.add(i);});
      el.querySelectorAll('.node').forEach(n=>n.classList.toggle('hot',hotNodes.has(n.dataset.name)));
      el.querySelectorAll('.link').forEach(p=>{const on=hotEdges.has(+p.dataset.i);p.classList.toggle('hot',on);});
      el.querySelectorAll('.edgelabel').forEach(t=>t.style.opacity=hotEdges.has(+t.dataset.i)?1:0);
    });
    g.addEventListener('mouseleave',()=>{
      el.classList.remove('dim');
      el.querySelectorAll('.node').forEach(n=>n.classList.remove('hot'));
      el.querySelectorAll('.link').forEach(p=>p.classList.remove('hot'));
      el.querySelectorAll('.edgelabel').forEach(t=>t.style.opacity=0);
    });
  });
}

}

/* ============ 재무 별도/연결 전환 ============ */
function setFinMode(m){
  finMode = m;
  document.querySelectorAll('#finModeCtl button').forEach(b=>b.dataset.on = b.dataset.m===m ? 1 : 0);
  renderCards();
  // 상세 모달이 열려 있으면 같은 회사로 다시 렌더
  if(overlay.classList.contains('open') && window.__lastCo){
    const c = DATA.companies.find(x=>x.name===window.__lastCo);
    if(c) openCompany(c);
  }
}
document.querySelectorAll('#finModeCtl button').forEach(b=>b.onclick=()=>setFinMode(b.dataset.m));

/* ============ 검색 ============ */
document.getElementById('q').addEventListener('input',e=>{query=e.target.value.trim().toLowerCase();renderAll();});

/* ============ 데이터 로딩 ============ */
function applyData(d,label,live){
  if(!d||!d.companies){alert("올바른 데이터 형식이 아닙니다 (companies 필드 없음).");return;}
  DATA=d;
  document.getElementById('upd').textContent=d.updated_at||"—";
  document.getElementById('srcLabel').textContent=label;
  document.getElementById('srcDot').className="dot"+(live?"":" embedded");
  renderChips();renderAll();
}
document.getElementById('btnUpload').onclick=()=>document.getElementById('file').click();
document.getElementById('file').addEventListener('change',ev=>{
  const f=ev.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{applyData(JSON.parse(rd.result),"업로드 JSON",true);}catch(e){alert("JSON 파싱 실패: "+e.message);}};
  rd.readAsText(f);
});
document.getElementById('btnLocal').onclick=async()=>{
  const btn=document.getElementById('btnLocal'); const old=btn.textContent; btn.textContent="연결 중…";
  const ports=[8765,5000,8000];
  for(const p of ports){
    try{
      const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),1500);
      const res=await fetch(`http://localhost:${p}/api/data`,{signal:ctrl.signal});
      clearTimeout(t);
      if(res.ok){const d=await res.json();applyData(d,`로컬 :${p}`,true);btn.textContent="연결됨";setTimeout(()=>btn.textContent=old,1500);return;}
    }catch(e){/* try next */}
  }
  btn.textContent="연결 실패";
  alert("로컬 수집기에 연결하지 못했습니다.\n\n터미널에서 아래를 실행한 뒤 다시 시도하세요:\n  python collector.py --serve\n\n(수집기가 localhost:8765 에서 데이터를 제공합니다)");
  setTimeout(()=>btn.textContent=old,1800);
};

/* ============ init ============ */
document.getElementById('upd').textContent=DATA.updated_at;
renderChips();renderAll();
// 데이터 로드 우선순위: ① 로컬 수집기(localhost) → ② 같은 폴더의 dashboard_data.json(웹 배포용) → ③ 내장 데이터
(async()=>{
  try{
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),1200);
    const res=await fetch('http://localhost:8765/api/data',{signal:ctrl.signal});
    clearTimeout(t);
    if(res.ok){applyData(await res.json(),"로컬 :8765",true);return;}
  }catch(e){/* 다음 소스로 */}
  try{
    // 웹 서버(GitHub Pages, Netlify 등)에 dashboard_data.json 을 함께 올리면 자동 로드됨
    const res=await fetch('dashboard_data.json?t='+Date.now());
    if(res.ok){applyData(await res.json(),"게시 데이터",true);}
  }catch(e){/* 내장 데이터 유지 (file:// 로 열면 이 단계는 항상 건너뜀) */}
})();
</script>
</body>
</html>
